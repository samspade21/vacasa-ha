name: "Test, Lint & Validate"

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  quality-checks:
    name: "Quality Checks (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.14"
            primary: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --group test

      - name: Run pre-commit auto-fixes
        if: ${{ matrix.primary }}
        run: uv run pre-commit run --all-files --config .pre-commit-config.yaml || true

      - name: Commit formatting fixes
        if: ${{ matrix.primary && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          disallowed_files=$(git diff --name-only -- .github/workflows)
          if [ -n "$disallowed_files" ]; then
            echo "Reverting changes to workflow files:"
            echo "$disallowed_files"
            while IFS= read -r file; do
              git checkout -- "$file"
            done <<< "$disallowed_files"
          fi
          git diff --quiet || (git add -A && git commit -m "style: Auto-fix formatting issues" && git push)

      - name: Re-run pre-commit checks
        if: ${{ matrix.primary }}
        run: uv run pre-commit run --all-files --config .pre-commit-config-ci.yaml

      - name: Run tests with coverage
        if: ${{ matrix.primary }}
        run: uv run pytest tests/ -v --cov=custom_components/vacasa --cov-report=xml

      - name: Run tests
        if: ${{ !matrix.primary }}
        run: uv run pytest tests/ -v

      - name: Upload coverage to Codecov
        if: ${{ matrix.primary }}
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  security:
    name: "Security Checks"
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Run bandit security check
        run: uvx bandit -r custom_components/vacasa/ -f json -o bandit-report.json || true

      - name: Run safety check
        run: uvx safety check --json --output safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # Slower validation jobs - run after fast jobs pass
  validate:
    name: "Validate Integration"
    runs-on: ubuntu-latest
    needs: [quality-checks, security]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Run hassfest validation
        uses: "home-assistant/actions/hassfest@master"

      - name: Validate manifest
        run: |
          python -c "
          import json
          import sys

          # Load and validate manifest.json
          with open('custom_components/vacasa/manifest.json', 'r') as f:
              manifest = json.load(f)

          # Check required fields
          required_fields = ['domain', 'name', 'documentation', 'requirements', 'codeowners', 'version']
          missing_fields = [field for field in required_fields if field not in manifest]

          if missing_fields:
              print(f'Missing required fields: {missing_fields}')
              sys.exit(1)

          # Check version format
          version = manifest['version']
          if not version or not version.count('.') >= 2:
              print(f'Invalid version format: {version}')
              sys.exit(1)

          print('Manifest validation passed')
          "

      - name: Create test Home Assistant config
        run: |
          mkdir -p test_config/custom_components
          cp -r custom_components/vacasa test_config/custom_components/
          cat > test_config/configuration.yaml << EOF
          homeassistant:
            name: Test
            latitude: 32.87336
            longitude: 117.22743
            elevation: 430
            unit_system: imperial
            time_zone: America/Los_Angeles

          logger:
            default: info
            logs:
              custom_components.vacasa: debug
          EOF

      - name: Validate Home Assistant config
        run: |
          cd test_config
          uv run --with homeassistant --with colorlog hass --script check_config --config . --info all

  hacs-validate:
    name: "HACS Validation"
    runs-on: ubuntu-latest
    needs: [quality-checks, security]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands
